<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RollerBN — Book an Activity</title>
  <style>
    /* ── Reset & base ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand:      #ff4d00;
      --brand-dark: #cc3d00;
      --bg:         #f5f5f7;
      --surface:    #ffffff;
      --text:       #1d1d1f;
      --muted:      #6e6e73;
      --border:     #d2d2d7;
      --radius:     14px;
      --shadow:     0 4px 24px rgba(0,0,0,.08);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ──────────────────────────────────────────────── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 64px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo {
      width: 36px;
      height: 36px;
      background: var(--brand);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo svg { fill: #fff; }

    header h1 {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -.01em;
    }

    header span {
      font-size: .85rem;
      color: var(--muted);
    }

    /* ── Main layout ─────────────────────────────────────────── */
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    .page-title {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -.03em;
      margin-bottom: 6px;
    }

    .page-subtitle {
      color: var(--muted);
      font-size: 1rem;
      margin-bottom: 36px;
    }

    /* ── Grid ────────────────────────────────────────────────── */
    #products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px;
    }

    /* ── Skeleton loader ─────────────────────────────────────── */
    @keyframes shimmer {
      0%   { background-position: -400px 0; }
      100% { background-position: 400px 0; }
    }

    .skeleton {
      background: linear-gradient(90deg, #e8e8eb 25%, #f0f0f3 50%, #e8e8eb 75%);
      background-size: 800px 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 8px;
    }

    .card-skeleton {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .card-skeleton .sk-img  { height: 200px; }
    .card-skeleton .sk-body { padding: 20px; display: flex; flex-direction: column; gap: 10px; }
    .card-skeleton .sk-h    { height: 20px; width: 70%; }
    .card-skeleton .sk-p    { height: 14px; width: 100%; }
    .card-skeleton .sk-p2   { height: 14px; width: 85%; }
    .card-skeleton .sk-btn  { height: 42px; width: 100%; margin-top: 8px; border-radius: 10px; }

    /* ── Product card ─────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform .15s, box-shadow .15s;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 32px rgba(0,0,0,.12);
    }

    .card-img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      background: var(--border);
      display: block;
    }

    .card-img-placeholder {
      width: 100%;
      height: 200px;
      background: linear-gradient(135deg, #ff4d0020, #ff8c6020);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
    }

    .card-body {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1;
    }

    .card-name {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -.02em;
      line-height: 1.3;
    }

    .card-description {
      font-size: .875rem;
      color: var(--muted);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-meta {
      display: flex;
      gap: 14px;
      font-size: .8rem;
      color: var(--muted);
      flex-wrap: wrap;
    }

    .card-meta-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .card-meta-item svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }

    .price {
      font-size: 1.25rem;
      font-weight: 800;
      color: var(--brand);
      letter-spacing: -.02em;
    }

    .price-from {
      font-size: .75rem;
      font-weight: 400;
      color: var(--muted);
      margin-left: 3px;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag {
      background: #ff4d000f;
      color: var(--brand-dark);
      border-radius: 20px;
      padding: 3px 10px;
      font-size: .72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    .btn-book {
      margin-top: auto;
      padding: 12px 20px;
      background: var(--brand);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: .95rem;
      font-weight: 700;
      cursor: pointer;
      transition: background .15s, transform .1s;
      letter-spacing: -.01em;
    }

    .btn-book:hover  { background: var(--brand-dark); }
    .btn-book:active { transform: scale(.97); }

    /* ── Error state ─────────────────────────────────────────── */
    .error-box {
      background: #fff0ee;
      border: 1px solid #ffd0c4;
      border-radius: var(--radius);
      padding: 24px;
      color: #a3220a;
      text-align: center;
    }

    /* ── Modal ───────────────────────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal {
      background: var(--surface);
      border-radius: 20px;
      padding: 32px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,.25);
      transform: translateY(16px) scale(.97);
      transition: transform .2s;
    }

    .modal-overlay.active .modal {
      transform: translateY(0) scale(1);
    }

    .modal h2 {
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: -.03em;
      margin-bottom: 6px;
    }

    .modal .modal-product-name {
      font-size: .9rem;
      color: var(--muted);
      margin-bottom: 24px;
    }

    .modal label {
      display: block;
      font-size: .85rem;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .modal input[type="date"] {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 1rem;
      color: var(--text);
      outline: none;
      transition: border-color .15s;
      margin-bottom: 24px;
      font-family: inherit;
    }

    .modal input[type="date"]:focus {
      border-color: var(--brand);
    }

    .modal-actions {
      display: flex;
      gap: 10px;
    }

    .btn-cancel {
      flex: 1;
      padding: 12px;
      background: var(--bg);
      color: var(--text);
      border: none;
      border-radius: 10px;
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }

    .btn-cancel:hover { background: var(--border); }

    .btn-confirm {
      flex: 2;
      padding: 12px;
      background: var(--brand);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: .95rem;
      font-weight: 700;
      cursor: pointer;
      transition: background .15s;
    }

    .btn-confirm:hover  { background: var(--brand-dark); }
    .btn-confirm:disabled {
      opacity: .45;
      cursor: not-allowed;
    }

    /* ── Responsive ──────────────────────────────────────────── */
    @media (max-width: 480px) {
      .page-title { font-size: 1.5rem; }
      #products-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <div class="logo">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/>
      </svg>
    </div>
    <h1>RollerBN</h1>
    <span>Book an Experience</span>
  </header>

  <!-- Main content -->
  <main>
    <h2 class="page-title">What's on today?</h2>
    <p class="page-subtitle">Pick an activity and secure your spot in seconds.</p>

    <div id="products-grid" aria-live="polite" aria-busy="true">
      <!-- Skeleton cards rendered by JS -->
    </div>
  </main>

  <!-- Date picker modal -->
  <div class="modal-overlay" id="booking-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal">
      <h2 id="modal-title">Choose a date</h2>
      <p class="modal-product-name" id="modal-product-name"></p>
      <label for="date-input">Select your preferred date</label>
      <input type="date" id="date-input" />
      <div class="modal-actions">
        <button class="btn-cancel" id="modal-cancel">Cancel</button>
        <button class="btn-confirm" id="modal-confirm" disabled>Book Now &rarr;</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
